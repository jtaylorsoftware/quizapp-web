version: 2.1

orbs:
  node: circleci/node@7.1.1
  aws-cli: circleci/aws-cli@5.4.1
  aws-s3: circleci/aws-s3@4.1.2

jobs:
  test:
    executor: node/default
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          command: npm run test
  build:
    executor: node/default
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          command: CI=false REACT_APP_API_HOST="$API_URI" npm run build
      - persist_to_workspace:
          root: build
          paths:
            - '*'
  publish:
    executor: aws-s3/default
    steps:
      - aws-cli/setup:
          profile_name: default
      - attach_workspace:
          at: build
      - aws-s3/copy:
          from: build
          to: $S3_BUCKET
          arguments: --recursive

workflows:
  test_build_publish_s3:
    jobs:
      - test
      - build:
          requires:
            - test
      - publish:
          requires:
            - build
            - test
          filters:
            branches:
              only:
                - main
